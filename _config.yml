# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Muchen Wen
first_name: Muchen
middle_name: 
last_name: Wen
contact_note: >
  Best way to reach me is via email.
description: >
  Ph.D. Candidate in Information Systems and Management Science. 
  Research interests: Sharing Economy, Empirical OM, Urban Computing.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

keywords: Sharing Economy, Bike-Sharing, Urban Computing, Empirical OM, Information Systems
lang: en
icon: 🚲

url: https://muchenwen.github.io
baseurl: 
last_updated: true
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true

max_width: 930px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: true
serve_schema_org: true
og_image: assets/img/prof_pic.jpg

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics:
google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Research Blog
blog_description: Thoughts on Sharing Economy and Urban Computing
permalink: /blog/:year/:title/
lsi: false

pagination:
  enabled: true
  per_page: 5
  permalink: "/page/:num/"
  title: ":title - page :num"
  limit: 0
  sort_field: "date"
  sort_reverse: true

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  books:
    output: true
    permalink: /books/:path/
  teachings:
    output: true
    permalink: /teachings/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

# -----------------------------------------------------------------------------
# Front Matter Defaults
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: page
  - scope:
      path: ""
      type: books
    values:
      layout: book-review
  - scope:
      path: ""
      type: teachings
    values:
      layout: post

# -----------------------------------------------------------------------------
# Exclude from processing
# -----------------------------------------------------------------------------

exclude:
  - _pages/about_einstein.md
  - _pages/cv.md
  - _pages/dropdown.md
  - _pages/profiles.md
  - _pages/projects.md
  - _pages/repositories.md
  - _pages/teaching.md
  - _posts/
  - _projects/
  - _books/
  - _teachings/
  - bin/
  - vendor
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - FAQ.md
  - INSTALL.md
  - LICENSE
  - TROUBLESHOOTING.md
  - ANALYTICS.md
  - SEO.md
  - QUICKSTART.md
  - .all-contributorsrc
  - .git-blame-ignore-revs
  - .pre-commit-config.yaml
  - .prettierrc
  - .prettierignore
  - .lycheeignore
  - docker-compose.yml
  - docker-compose-slim.yml
  - Dockerfile
  - lighthouse_results/
  - readme_preview/

keep_files:
  - CNAME
  - .nojekyll

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Wen]
  first_name: [Muchen]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: true
  dimensions: true
  google_scholar: true
  inspirehep: false

filtered_bibtex_keywords:
  [
    abbr,
    abstract,
    additional_info,
    altmetric,
    annotation,
    arxiv,
    award,
    award_name,
    bibtex_show,
    blog,
    code,
    dimensions,
    eprint,
    google_scholar_id,
    hal,
    html,
    inspirehep_id,
    pdf,
    pmid,
    poster,
    preview,
    selected,
    slides,
    supp,
    video,
    website,
  ]

max_author_limit: 4
more_authors_animation_delay: 10

enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# External Links
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics: false
enable_cronitor_analytics: false
enable_pirsch_analytics: false
enable_openpanel_analytics: false
cookie_consent:
  enabled: false
enable_masonry: true
enable_math: true
enable_tooltips: true
enable_darkmode: true
enable_navbar_social: true
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

# -----------------------------------------------------------------------------
# Icon
# -----------------------------------------------------------------------------

icon:
  name: 
  width: 
  height: 

# -----------------------------------------------------------------------------
# Social Networks
# -----------------------------------------------------------------------------

# Social links are configured in _data/socials.yml

# -----------------------------------------------------------------------------
# Repository
# -----------------------------------------------------------------------------
repository:
  url: 
  owner: muchenwen
  repo: muchenwen.github.io

# -----------------------------------------------------------------------------
# Deploy
# -----------------------------------------------------------------------------

deploy:
  - provider: git
    branch: gh-pages
    commit_message: "Deploy to GitHub Pages"

# -----------------------------------------------------------------------------
# Sitemap
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------

jekyll-minifier:
  compress_javascript: false
  exclude: ["robots.txt", "assets/js/search/*.js"]

# -----------------------------------------------------------------------------
# Terser
# -----------------------------------------------------------------------------

terser:
  compress:
    drop_console: true

# -----------------------------------------------------------------------------
# Jekyll Archives
# -----------------------------------------------------------------------------

jekyll-archives:
  posts:
    enabled: false
  news:
    enabled: false
  books:
    enabled: false

# -----------------------------------------------------------------------------
# Responsive WebP Images
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".gif"
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true
